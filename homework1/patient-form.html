<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration Form</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
     <div id="banner">

        <h1>ABC Medical Patient Portal</h1>

        <p id="date"></p>

    </div>

    <form>

<table>

    <tr>
        <td>First Name:</td>
        <td><input type="text" maxlength="30"></td>

        <td>Middle Initial:</td>
        <td><input type="text" maxlength="1"></td>
    </tr>

    <tr>
        <td>Last Name:</td>
        <td><input type="text" maxlength="30"></td>
    </tr>

<tr>
    <td>Date of Birth (MM/DD/YYYY):</td>
    <td><input type="text" placeholder="MM/DD/YYYY" maxlength="10"></td>

    <td>SSN:</td>
    <td><input type="password" maxlength="11"></td>
</tr>

    <tr>
    <td>Address Line 1:</td>
    <td><input type="text" maxlength="30"></td>

    <td>Address Line 2:</td>
    <td><input type="text" maxlength="30"></td>
</tr>

<tr>
    <td>City:</td>
    <td><input type="text" maxlength="30"></td>

    <td>State:</td>
    <td>
        <select>
            <option>Texas</option>
            <option>California</option>
            <option>New York</option>
            <option>Florida</option>
            <option>Illinois</option>
            <option>Other</option>
        </select>
    </td>
</tr>

<tr>
    <td>Zip Code:</td>
    <td><input type="text" maxlength="10"></td>
</tr>

    <tr>
    <td>Email:</td>
    <td><input type="email" placeholder="name@example.com"></td>

    <td>User ID:</td>
    <td><input type="text" maxlength="20"></td>
</tr>
</table>

</form>

    <script>
        const today = new Date();
        document.getElementById("date").innerHTML =
            "Today is: " + today.toDateString();
    </script>
</body>

</html>
